protocol: one_rest
train_category: car
exclude_train_category_from_test: true
zero_shot_target: true
use_target_anomaly_for_training: false
save_per_category_metrics: true
save_mean_metrics: true

# Independent geometric mode prompting path. The legacy CAP/DAP path stays off.
use_geometric_cap: false
use_geometric_dap: false
use_geometric_mode_prompt: true
geometric_mode_version: se3_mode_prompt_v7_gate_sinkhorn
use_category_prompt: true
prompt_template: "a point cloud patch of a {category}"

num_geometric_modes: 6
num_normal_tokens: 4
num_abnormal_tokens: 4
use_mode_specific_residual: true
use_mode_weighted_scoring: true
use_patch_mode_routing: true
mode_anomaly_patch_threshold: 0.05
use_geometry_abnormal_gate: true
geometry_gate_logit_scale: 0.5
lambda_geometry_gate: 0.1
geometry_gate_margin: 0.5
use_sinkhorn_mode_assignment: true
lambda_mode_assignment: 0.2
sinkhorn_epsilon: 0.05
sinkhorn_iterations: 3
mode_score_temperature: 0.07
mode_score_type: logsumexp
mode_residual_scale: 0.1
mode_router_temperature: 0.2
mode_prompt_hidden_dim: 512

geometry_graph_dim: 128
geometry_graph_k: 8
geometry_graph_layers: 2
feature_layers: [2, 5, 8, 11]

use_mode_diversity_loss: true
use_mode_entropy_loss: false
use_residual_suppression_loss: true
lambda_mode_diversity: 0.01
lambda_mode_entropy: 0.05
mode_conditional_entropy_weight: 0.5
lambda_residual_suppression: 0.003
lambda_se3_sanity: 0.0

freeze_plm: true
freeze_text_encoder: true
freeze_visual_adapter: true
baseline_checkpoint: outputs/one_rest_visual_baseline_v7/Real3D/{train_category}/best.pth

learning_rate: 0.001
prompt_learning_rate: 0.0001
prior_learning_rate: 0.001
weight_decay: 0.0001
warmup_ratio: 0.1
minimum_learning_rate: 0.000001
gradient_clip_norm: 10.0

dataset_name: Real3D
data_root: /home/objectdec/data/Point3D/Real3D-AD-PCD_btp_fps2048
model_path: ./pretrained/ULIP-2-PointBERT-10k-xyzrgb-pc-vit_g-objaverse_shapenet-pretrained.pt
train_split: test
test_split: test
output_root: ./outputs/one_rest_geometric_mode_prompt_v7
return_layers: [2, 5, 8, 11]
feature_layer: 11
token_dim: 384
text_dim: 1280
temperature: 0.07
global_alpha: 0.0
top_percent: 0.2
epochs: 100
batch_size: 4
num_workers: 4
focal_weight: 1.0
dice_weight: 1.0
object_weight: 0.5
focal_gamma: 2.0
focal_alpha: 0.5
num_points: 2048
seed: 111
device: cuda

# Only used by the fixed-prompt baseline path.
normal_templates: [a 3D point cloud of a normal object]
anomaly_templates: [a 3D point cloud of a defective object]
