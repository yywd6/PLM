protocol: one_rest
train_categories: [airplane, car]
exclude_train_category_from_test: true
zero_shot_target: true
use_target_anomaly_for_training: false
save_per_category_metrics: true
save_mean_metrics: true

# Stage 2: one learnable normal Prompt and six learnable abnormal Prompts.
use_static_prompt: true
static_prompt_version: static_six_prompt_v1
use_category_prompt: true
prompt_template: "a point cloud patch of a {category}"

num_abnormal_prompts: 6
num_normal_tokens: 4
num_abnormal_tokens: 4
prompt_score_temperature: 0.07
use_prompt_diversity_loss: true
lambda_prompt_diversity: 0.01

freeze_plm: true
freeze_text_encoder: true
freeze_visual_adapter: true
baseline_checkpoint: outputs/selected_two_rest_visual_baseline_v7/Real3D/{train_category}/best.pth

learning_rate: 0.001
prompt_learning_rate: 0.0001
weight_decay: 0.0001
warmup_ratio: 0.1
minimum_learning_rate: 0.000001
gradient_clip_norm: 10.0

dataset_name: Real3D
data_root: /home/objectdec/data/Point3D/Real3D-AD-PCD_btp_fps2048
model_path: ./pretrained/ULIP-2-PointBERT-10k-xyzrgb-pc-vit_g-objaverse_shapenet-pretrained.pt
train_split: test
test_split: test
output_root: ./outputs/selected_two_rest_ablation_static_six_prompt_v7_uniform_scoring/Real3D
return_layers: [2, 5, 8, 11]
feature_layer: 11
feature_layers: [2, 5, 8, 11]
token_dim: 384
text_dim: 1280
temperature: 0.07
global_alpha: 0.0
top_percent: 0.2
epochs: 100
batch_size: 4
num_workers: 4
focal_weight: 1.0
dice_weight: 1.0
object_weight: 0.5
focal_gamma: 2.0
focal_alpha: 0.5
num_points: 2048
seed: 111
device: cuda

normal_templates: [a 3D point cloud of a normal object]
anomaly_templates: [a 3D point cloud of a defective object]
